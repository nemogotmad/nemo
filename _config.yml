title: "Nemo's Articles"
description: "Thoughts, stories, and ideas worth sharing"
url: "https://nemogotmad.github.io"
author: "Nemo Gotmad"
email: pragsnemo01@gmail.com
timezone: Asia/Kolkata

# Build settings
markdown: kramdown
highlighter: rouge
permalink: /:year/:month/:title/

# Navigation menu (this creates the top bar)
header_pages:
  - index.html
  - categories.html
  - about.html
  - contact.html
  - terms.html
  - privacy.html

# Defaults
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "default"
      author: "Nemo Gotmad"
