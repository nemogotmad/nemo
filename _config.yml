title: "Delhi Voices"
description: "Latest news, culture & stories from India's capital"
url: "https://yourdomain.com"  # Change to your custom domain
author: "Nemo Gotmad"
email: pragsnemo01@gmail.com
timezone: Asia/Kolkata
locale: en_IN

# Build settings
markdown: kramdown
highlighter: rouge
permalink: /:year/:month/:title/

# Collections for categories
collections:
  categories:
    output: true
    permalink: /category/:path/

# Defaults
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "default"
      author: "Nemo Gotmad"
